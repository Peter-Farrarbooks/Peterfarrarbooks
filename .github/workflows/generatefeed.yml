name: Generate RSS Feed

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install beautifulsoup4

      - name: Generate feed.xml and blog/index.html
        run: |
          cd peterfarrarbooks
          python generate_feed.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
		  git add peterfarrarbooks/feed.xml peterfarrarbooks/blog/index.html peterfarrarbooks/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add peterfarrarbooks/feed.xml peterfarrarbooks/blog/index.html peterfarrarbooks/index.html
            git commit -m "Auto-update feed.xml and blog index"
            git push
          fi
