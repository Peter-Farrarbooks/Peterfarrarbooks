media:
  input: "images"
  output: "/images"
  # Replace the URL below with your actual Cloudflare address or peterfarrarbooks.com
  url: "https://be9e7ce3.peterfarrarbooks.pages.dev/images/" 

content:
  - name: pages
    label: Website Pages
    # ... the rest of your code ...
content:
  - name: pages
    label: Website Pages
    type: collection
    path: ""
    extension: html
    fields:
      - { name: body, label: Page Content, type: rich-text, options: { format: html } }

  - name: books
    label: My Books
    type: collection
    path: "books"
    extension: html
    fields:
      - { name: title, label: Book Title, type: string }
      - { name: body, label: Book Description, type: rich-text, options: { format: html } }
